<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Favorite City Weather</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="style.css">


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


</head>


<body>


    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <h3 class="text-white">
                🌆 Favorite City Weather
            </h3>

        </div>

    </nav>




    <section class="hero">


        <div class="container text-center">


            <h1>
                Cari Kota Favorit
            </h1>


            <p>
                Weather Dashboard Real Time
            </p>


            <input id="cityInput" class="form-control" placeholder="Contoh : Jakarta">


            <button class="btn btn-primary mt-3" onclick="searchCity()">

                Cari Kota

            </button>


        </div>

    </section>





    <div class="container mt-5">


        <div class="weather-card">


            <h2 id="cityName">
                Pilih Kota
            </h2>


            <div id="icon">
                🌤️
            </div>


            <h1 id="temperature">
                --
            </h1>



            <div class="row text-center">


                <div class="col">

                    <h4 id="humidity">
                        --
                    </h4>

                    <p>
                        Kelembapan
                    </p>

                </div>


                <div class="col">

                    <h4 id="wind">
                        --
                    </h4>

                    <p>
                        Angin
                    </p>

                </div>


                <div class="col">

                    <h4 id="pressure">
                        --
                    </h4>

                    <p>
                        Tekanan
                    </p>

                </div>


            </div>


        </div>





        <h2 class="mt-5">
            📅 Forecast 7 Hari
        </h2>


        <div id="forecast" class="row">

        </div>





        <h2 class="mt-5">
            📍 Lokasi Kota
        </h2>


        <div id="map"></div>





        <h2 class="mt-5">
            📈 Grafik Suhu
        </h2>


        <canvas id="chart"></canvas>



    </div>






    <footer>

        Favorite City Weather Dashboard

    </footer>



    <script src="script.js"></script>


</body>

</html>
